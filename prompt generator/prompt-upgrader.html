<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Prompt Upgrader</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #08111f;
        --bg-alt: #0d1728;
        --panel: rgba(12, 20, 36, 0.86);
        --border: rgba(255, 255, 255, 0.1);
        --text: #ecf3ff;
        --muted: #9fb0cc;
        --accent: #79a8ff;
        --accent-strong: #5b8dff;
        --danger: #ff8fa3;
        --shadow: 0 30px 80px rgba(0, 0, 0, 0.35);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        background:
          radial-gradient(circle at top left, rgba(79, 124, 255, 0.25), transparent 34%),
          radial-gradient(circle at top right, rgba(70, 215, 255, 0.15), transparent 28%),
          linear-gradient(180deg, var(--bg), var(--bg-alt));
        color: var(--text);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      body {
        min-height: 100vh;
      }

      button,
      textarea {
        font: inherit;
      }

      .shell {
        width: min(980px, calc(100% - 32px));
        margin: 0 auto;
        padding: 48px 0 64px;
      }

      .hero {
        margin-bottom: 24px;
      }

      .eyebrow {
        margin: 0 0 12px;
        color: var(--accent);
        font-size: 0.85rem;
        font-weight: 700;
        letter-spacing: 0.16em;
        text-transform: uppercase;
      }

      .hero h1 {
        margin: 0;
        max-width: 14ch;
        font-size: clamp(2.4rem, 6vw, 4.8rem);
        line-height: 0.98;
        letter-spacing: -0.05em;
      }

      .lede {
        margin: 18px 0 0;
        max-width: 58ch;
        color: var(--muted);
        font-size: 1.05rem;
        line-height: 1.7;
      }

      .panel {
        display: grid;
        gap: 20px;
        padding: 24px;
        border: 1px solid var(--border);
        border-radius: 28px;
        background: var(--panel);
        box-shadow: var(--shadow);
        backdrop-filter: blur(18px);
      }

      .form {
        display: grid;
        gap: 12px;
      }

      .examples {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .exampleChip {
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 999px;
        padding: 10px 14px;
        background: rgba(10, 17, 30, 0.72);
        color: var(--muted);
        cursor: pointer;
      }

      .exampleChip:hover {
        border-color: rgba(121, 168, 255, 0.55);
        color: var(--text);
        background: rgba(18, 29, 50, 0.95);
      }

      .label {
        color: var(--text);
        font-size: 0.95rem;
        font-weight: 600;
      }

      .textarea {
        width: 100%;
        resize: vertical;
        min-height: 140px;
        padding: 16px 18px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 18px;
        background: rgba(5, 10, 18, 0.8);
        color: var(--text);
        line-height: 1.6;
        outline: none;
      }

      .textarea:focus {
        border-color: rgba(121, 168, 255, 0.7);
        box-shadow: 0 0 0 4px rgba(91, 141, 255, 0.16);
      }

      .textarea::placeholder {
        color: rgba(159, 176, 204, 0.65);
      }

      .output {
        min-height: 260px;
      }

      .button,
      .copyButton {
        border: 0;
        border-radius: 999px;
        padding: 12px 18px;
        cursor: pointer;
      }

      .button {
        justify-self: start;
        background: linear-gradient(135deg, var(--accent), var(--accent-strong));
        color: #04111f;
        font-weight: 800;
      }

      .copyButton {
        border: 1px solid rgba(255, 255, 255, 0.12);
        padding: 8px 14px;
        background: rgba(10, 17, 30, 0.72);
        color: var(--text);
      }

      .button:disabled,
      .copyButton:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }

      .error {
        margin: 0;
        color: var(--danger);
        font-weight: 600;
      }

      .result {
        display: grid;
        gap: 12px;
      }

      .resultHeader {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
      }

      .resultMeta {
        display: flex;
        align-items: center;
        justify-content: flex-end;
        gap: 10px;
        flex-wrap: wrap;
      }

      .resultHeader h2 {
        margin: 0;
        font-size: 1rem;
      }

      .resultHeader span {
        color: var(--muted);
        font-size: 0.9rem;
      }

      @media (max-width: 720px) {
        .shell {
          width: min(100% - 20px, 980px);
          padding: 24px 0 40px;
        }

        .panel {
          padding: 18px;
          border-radius: 22px;
        }

        .hero h1 {
          max-width: none;
        }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <p class="eyebrow">Prompt Upgrader</p>
        <h1>짧은 프롬프트를 더 좋은 시스템 프롬프트로 바꿔보세요.</h1>
        <p class="lede">
          이 HTML 파일은 브라우저에서 바로 열 수 있고, OpenAI 호출은
          `http://localhost:3000/api/generate`로 보냅니다. 먼저 개발 서버를 켜두면 됩니다.
        </p>
      </section>

      <section class="panel">
        <form class="form" id="form">
          <label class="label" for="prompt">원본 프롬프트</label>
          <textarea
            id="prompt"
            class="textarea"
            placeholder="예: 여행 일정 짜줘"
            rows="8"
          ></textarea>
          <button class="button" id="submit" type="submit">프롬프트 업그레이드</button>
        </form>

        <div class="examples" aria-label="예시 프롬프트">
          <button class="exampleChip" type="button" data-example="여행 일정 짜줘">여행 일정 짜줘</button>
          <button class="exampleChip" type="button" data-example="블로그 글 써줘">블로그 글 써줘</button>
          <button class="exampleChip" type="button" data-example="고객 응대용 답변 프롬프트 만들어줘">고객 응대용 답변 프롬프트 만들어줘</button>
        </div>

        <p class="error" id="error" hidden></p>

        <div class="result">
          <div class="resultHeader">
            <h2>결과</h2>
            <div class="resultMeta">
              <span id="status">대기 중</span>
              <span id="copyStatus"></span>
              <button class="copyButton" id="copy" type="button" disabled>복사</button>
            </div>
          </div>
          <textarea
            class="textarea output"
            id="output"
            readonly
            placeholder="여기에 개선된 프롬프트가 표시됩니다."
            rows="14"
          ></textarea>
        </div>
      </section>
    </main>

    <script>
      const API_URL = "http://localhost:3000/api/generate";

      const form = document.getElementById("form");
      const promptInput = document.getElementById("prompt");
      const output = document.getElementById("output");
      const status = document.getElementById("status");
      const error = document.getElementById("error");
      const submit = document.getElementById("submit");
      const copy = document.getElementById("copy");
      const copyStatus = document.getElementById("copyStatus");

      function setError(message) {
        if (!message) {
          error.hidden = true;
          error.textContent = "";
          return;
        }

        error.hidden = false;
        error.textContent = message;
      }

      function setLoading(isLoading) {
        submit.disabled = isLoading || !promptInput.value.trim();
        status.textContent = isLoading ? "생성 중..." : output.value.trim() ? "완료" : "대기 중";
      }

      promptInput.addEventListener("input", () => {
        submit.disabled = !promptInput.value.trim();
      });

      document.querySelectorAll("[data-example]").forEach((button) => {
        button.addEventListener("click", () => {
          promptInput.value = button.getAttribute("data-example");
          setError("");
          copyStatus.textContent = "";
          submit.disabled = false;
        });
      });

      copy.addEventListener("click", async () => {
        if (!output.value.trim()) return;
        try {
          await navigator.clipboard.writeText(output.value);
          copyStatus.textContent = "복사됨";
        } catch {
          copyStatus.textContent = "복사 실패";
        }
      });

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        const prompt = promptInput.value.trim();
        if (!prompt) {
          setError("프롬프트를 입력해 주세요.");
          return;
        }

        setError("");
        copyStatus.textContent = "";
        output.value = "";
        copy.disabled = true;
        status.textContent = "생성 중...";
        submit.disabled = true;

        try {
          const response = await fetch(API_URL, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({ prompt }),
          });

          const data = await response.json();

          if (!response.ok) {
            throw new Error(data.error || "생성에 실패했습니다.");
          }

          output.value = data.prompt || "";
          status.textContent = "완료";
          copy.disabled = !output.value.trim();
        } catch (err) {
          status.textContent = "오류";
          setError(err instanceof Error ? err.message : "알 수 없는 오류가 발생했습니다.");
        } finally {
          submit.disabled = !promptInput.value.trim();
        }
      });
    </script>
  </body>
</html>
